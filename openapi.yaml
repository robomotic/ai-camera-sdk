openapi: 3.1.0
info:
  title: AI Camera SDK Control API
  version: 1.0.0
  summary: Local control-plane REST API for the AI Camera SDK board.
  description: |
    The AI Camera SDK Control API is the HTTPS control plane exposed by the
    `ai-camera-sdk` board. It configures, monitors, and administers the
    device but does **not** carry media: capture, processing and delivery
    are performed by GStreamer / DeepStream / NVIDIA shared memory.

    Supported hardware platforms (detector availability varies):

      * NVIDIA Jetson Nano
      * Ambarella CV-series SoCs
      * Raspberry Pi with HAILO accelerator

    This document (`openapi.yaml`) is licensed under **CC-BY-4.0** so that
    third parties can generate and distribute compatible clients without
    inheriting the web portal's AGPL-3.0 obligations. The reference web
    portal that consumes this API is licensed AGPL-3.0-only. Firmware and
    on-device services remain proprietary and are covered by a separate
    commercial EULA. See `docs/LICENSING.md` for the full rationale.
  contact:
    name: AI Camera SDK Maintainers
    url: https://github.com/robomotic/ai-camera-sdk
  license:
    name: CC-BY-4.0
    identifier: CC-BY-4.0
  termsOfService: https://docs.ai-camera-sdk.io/terms

servers:
  - url: https://{board}/api/v1
    description: On-device control plane (HTTPS, self-signed by default).
    variables:
      board:
        default: camera.local
        description: Hostname or IP address of the AI Camera SDK board.

tags:
  - name: System
    description: Device information, health, time, network, lifecycle.
  - name: Auth
    description: Login, token refresh, password change, API keys.
  - name: Users
    description: User account management.
  - name: Roles
    description: Built-in and custom RBAC roles.
  - name: Inputs
    description: Capture source registration (descriptive only).
  - name: Pipelines
    description: Processing graph lifecycle and configuration.
  - name: Detectors
    description: Per-pipeline detector configuration (face, plate, document).
  - name: Calibration
    description: Lens intrinsics and distortion correction.
  - name: Masks
    description: Privacy masks applied post-detection.
  - name: Outputs
    description: Per-pipeline output fan-out (RTSP, UDP, HDMI, shm, file).
  - name: Power
    description: Power metrics, policy and schedules.
  - name: Stats
    description: Counters, time-series and export.
  - name: Updates
    description: Firmware/security updates with A/B rollback.
  - name: Tunnels
    description: Remote-access tunnels (e.g. SeLink).
  - name: License
    description: Commercial license key management.
  - name: Events
    description: Historical events and realtime WebSocket channel.

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  # ===================================================================
  # Unauthenticated health probes
  # ===================================================================
  /healthz:
    get:
      operationId: getLiveness
      summary: Liveness probe
      description: Returns 200 if the control plane process is alive. Unauthenticated.
      tags: [System]
      security: []
      x-required-scopes: []
      responses:
        '200':
          description: Alive.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ok] }
        '500':
          $ref: '#/components/responses/Internal'

  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness probe
      description: Returns 200 when the device is ready to serve requests. Unauthenticated.
      tags: [System]
      security: []
      x-required-scopes: []
      responses:
        '200':
          description: Ready.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [ready] }
                  subsystems:
                    type: array
                    items: { type: string }
        '503':
          description: Not ready.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  # ===================================================================
  # Auth
  # ===================================================================
  /auth/login:
    post:
      operationId: login
      summary: Exchange credentials for a JWT access + refresh pair.
      tags: [Auth]
      security: []
      x-required-scopes: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '500': { $ref: '#/components/responses/Internal' }

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Exchange a refresh token for a new access token.
      tags: [Auth]
      security: []
      x-required-scopes: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Rotated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/Internal' }

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the current refresh token.
      tags: [Auth]
      x-required-scopes: []
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/Internal' }

  /auth/password:
    post:
      operationId: changeOwnPassword
      summary: Change the authenticated user's password.
      tags: [Auth]
      x-required-scopes: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordChangeRequest' }
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/Internal' }

  /auth/api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys the caller is allowed to see.
      tags: [Auth]
      x-required-scopes: [api_keys:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Page of API keys.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ApiKey' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createApiKey
      summary: Create an API key. Secret is returned once.
      tags: [Auth]
      x-required-scopes: [api_keys:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApiKeyCreate' }
      responses:
        '201':
          description: Created.
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKeyCreated' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/Internal' }

  /auth/api-keys/{id}:
    parameters:
      - $ref: '#/components/parameters/ApiKeyId'
    get:
      operationId: getApiKey
      summary: Get API key metadata (never the secret).
      tags: [Auth]
      x-required-scopes: [api_keys:read]
      responses:
        '200':
          description: Found.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiKey' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key.
      tags: [Auth]
      x-required-scopes: [api_keys:write]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

  /me:
    get:
      operationId: getMe
      summary: Get the authenticated user's profile and effective scopes.
      tags: [Users]
      x-required-scopes: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Me' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ===================================================================
  # Users
  # ===================================================================
  /users:
    get:
      operationId: listUsers
      summary: List users.
      tags: [Users]
      x-required-scopes: [users:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Page of users.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createUser
      summary: Create a user.
      tags: [Users]
      x-required-scopes: [users:admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: Created.
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      operationId: getUser
      summary: Get a user by id.
      tags: [Users]
      x-required-scopes: [users:read]
      responses:
        '200':
          description: Found.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateUser
      summary: Update a user.
      tags: [Users]
      x-required-scopes: [users:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
    delete:
      operationId: deleteUser
      summary: Delete a user.
      tags: [Users]
      x-required-scopes: [users:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

  /users/{id}:reset-password:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      operationId: resetUserPassword
      summary: Admin issues a temporary password for the user.
      tags: [Users]
      x-required-scopes: [users:admin]
      responses:
        '200':
          description: Temporary password issued.
          content:
            application/json:
              schema:
                type: object
                required: [temporary_password, expires_at]
                properties:
                  temporary_password: { type: string, format: password }
                  expires_at: { $ref: '#/components/schemas/Timestamp' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}:lock:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      operationId: lockUser
      summary: Lock a user account.
      tags: [Users]
      x-required-scopes: [users:admin]
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}:unlock:
    parameters:
      - $ref: '#/components/parameters/UserId'
    post:
      operationId: unlockUser
      summary: Unlock a user account.
      tags: [Users]
      x-required-scopes: [users:admin]
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===================================================================
  # Roles
  # ===================================================================
  /roles:
    get:
      operationId: listRoles
      summary: List built-in and custom roles.
      tags: [Roles]
      x-required-scopes: [roles:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Roles.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createRole
      summary: Create a custom role.
      tags: [Roles]
      x-required-scopes: [roles:admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleCreate' }
      responses:
        '201':
          description: Created.
          headers:
            Location: { $ref: '#/components/headers/Location' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /roles/{id}:
    parameters:
      - $ref: '#/components/parameters/RoleId'
    get:
      operationId: getRole
      summary: Get a role.
      tags: [Roles]
      x-required-scopes: [roles:read]
      responses:
        '200':
          description: Found.
          headers:
            ETag: { $ref: '#/components/headers/ETag' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateRole
      summary: Update a custom role.
      tags: [Roles]
      x-required-scopes: [roles:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleCreate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }
    delete:
      operationId: deleteRole
      summary: Delete a custom role (built-in roles cannot be deleted).
      tags: [Roles]
      x-required-scopes: [roles:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204': { $ref: '#/components/responses/NoContent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

  /audit-log:
    get:
      operationId: listAuditLog
      summary: Security-relevant audit events.
      tags: [Users]
      x-required-scopes: [audit:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: from
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Timestamp' }
        - name: to
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Timestamp' }
        - name: actor
          in: query
          required: false
          schema: { type: string }
        - name: action
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Page of audit events.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEvent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ===================================================================
  # System
  # ===================================================================
  /system/info:
    get:
      operationId: getSystemInfo
      summary: Device model, platform, firmware, serial.
      tags: [System]
      x-required-scopes: [system:read]
      responses:
        '200':
          description: System info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /system/health:
    get:
      operationId: getSystemHealth
      summary: Subsystem health rollup (authenticated, richer than /healthz).
      tags: [System]
      x-required-scopes: [system:read]
      responses:
        '200':
          description: Health.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemHealth' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /system/reboot:
    post:
      operationId: rebootSystem
      summary: Reboot the device.
      tags: [System]
      x-required-scopes: [system:admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Reboot scheduled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduled_at: { $ref: '#/components/schemas/Timestamp' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /system/shutdown:
    post:
      operationId: shutdownSystem
      summary: Shut down the device.
      tags: [System]
      x-required-scopes: [system:admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Shutdown scheduled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduled_at: { $ref: '#/components/schemas/Timestamp' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /system/time:
    get:
      operationId: getSystemTime
      summary: Get system time and NTP configuration.
      tags: [System]
      x-required-scopes: [system:read]
      responses:
        '200':
          description: Time.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemTime' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      operationId: updateSystemTime
      summary: Update NTP or set manual time.
      tags: [System]
      x-required-scopes: [system:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SystemTimeUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemTime' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

  /system/network:
    get:
      operationId: getNetworkConfig
      summary: Get hostname, interfaces and DNS.
      tags: [System]
      x-required-scopes: [system:read]
      responses:
        '200':
          description: Network config.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NetworkConfig' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      operationId: updateNetworkConfig
      summary: Update hostname / DNS (interface addressing is read-only).
      tags: [System]
      x-required-scopes: [system:admin]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkConfigUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NetworkConfig' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

  # ===================================================================
  # Inputs
  # ===================================================================
  /inputs:
    get:
      operationId: listInputs
      summary: List registered capture inputs.
      tags: [Inputs]
      x-required-scopes: [inputs:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Filter'
      responses:
        '200':
          description: Page.
