      operationId: refreshLicense
      summary: Online license refresh (requires internet).
      tags: [License]
      x-required-scopes: [license:admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Refreshed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LicenseStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '502':
          description: License server unreachable.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /license/features:
    get:
      operationId: getLicenseFeatures
      summary: Feature flags derived from the active license.
      tags: [License]
      x-required-scopes: [license:read]
      responses:
        '200':
          description: Features.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LicenseFeatures' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ===================================================================
  # Events (historical). Realtime is documented via x-websocket.
  # ===================================================================
  /events:
    get:
      operationId: listEvents
      summary: Historical events (paginated).
      tags: [Events]
      x-required-scopes: [events:read]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: from
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Timestamp' }
        - name: to
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Timestamp' }
        - name: types
          in: query
          required: false
          description: Comma-separated list of channel names.
          schema: { type: string }
      responses:
        '200':
          description: Page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Event' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

# ---------------------------------------------------------------------------
# Realtime WebSocket channel (not expressible in OpenAPI paths).
# Documented here via the `x-websocket` vendor extension and fully in
# docs/API-DESIGN.md. OpenAPI 3.1 `webhooks` is intentionally NOT used
# because it targets server-initiated HTTP callbacks, not persistent sockets.
# ---------------------------------------------------------------------------
x-websocket:
  url: wss://{board}/api/v1/ws
  description: |
    Authenticated realtime channel. Auth is provided either by a
    `?access_token=<jwt>` query parameter or by the
    `Sec-WebSocket-Protocol: bearer,<jwt>` sub-protocol header.

    After connection the client subscribes with:

        { "op": "subscribe", "channels": ["pipeline.status", "power.metrics"] }

    The server pushes JSON frames of the shape:

        { "channel": "pipeline.status", "ts": "2026-04-18T09:02:39Z", "data": { ... } }

    Heartbeat: server sends ping every 20s; idle sockets are closed after 60s.
  channels:
    - name: pipeline.status
      description: Pipeline state transitions, fps, backpressure, last error.
    - name: power.metrics
      description: Rolling power and thermal samples (1 Hz).
    - name: detector.events
      description: Detection-level events (faces, plates, documents).
    - name: updates.jobs
      description: Update job progress and completion.
    - name: tunnels.status
      description: Tunnel connection state transitions.
    - name: system.health
      description: Subsystem health changes.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by `POST /auth/login`. Token claims include
        `sub`, `roles`, `scope`, `exp`, `iat`, `jti`. Refresh via
        `POST /auth/refresh`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Long-lived machine credential, issued under `/auth/api-keys`.
        The secret is shown once at creation and never returned again.

  parameters:
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor returned by a previous page as `next_cursor`.
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Maximum number of items per page.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Sort:
      name: sort
      in: query
      description: |
        Sort order. Prefix with `-` for descending. Example: `-created_at`.
      required: false
      schema:
        type: string
    Filter:
      name: filter
      in: query
      description: |
        Deep-object filter parameters of the form `filter[field]=value`.
      required: false
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: |
        Optimistic-concurrency token echoing the last seen `ETag`. Requests
        that fail the precondition return 412.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-generated key (UUID v4 or ULID recommended). Replays of the
        same key within the idempotency window return the original response.
      schema:
        type: string
        maxLength: 255
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Client correlation id; echoed back on the response.
      schema:
        type: string
        maxLength: 128
    PipelineId:
      name: id
      in: path
      required: true
      description: Pipeline ULID.
      schema:
        $ref: '#/components/schemas/Id'
    DetectorType:
      name: type
      in: path
      required: true
      description: Detector type.
      schema:
        type: string
        enum: [face, license_plate, document]
    MaskId:
      name: mask_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    OutputId:
      name: out_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    UserId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    RoleId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    InputId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    CalibrationId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    TunnelId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    UpdateId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ScheduleId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'

  headers:
    ETag:
      description: Entity tag for optimistic concurrency.
      schema:
        type: string
    RateLimitLimit:
      description: Request quota for the current window.
      schema:
        type: integer
    RateLimitRemaining:
      description: Remaining requests in the current window.
      schema:
        type: integer
    RateLimitReset:
      description: Seconds until the current window resets.
      schema:
        type: integer
    RetryAfter:
      description: Seconds the client should wait before retrying.
      schema:
        type: integer
    Location:
      description: URL of the newly created resource.
      schema:
        type: string
        format: uri

  responses:
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            auth_required:
              value:
                type: https://docs.ai-camera-sdk.io/errors/auth-required
                title: Authentication required
                status: 401
                code: AUTH_REQUIRED
                detail: Missing or expired access token.
                instance: /api/v1/pipelines
                trace_id: 01HF8Z8W9Q4J7K5N2V3X6M1T0B
    Forbidden:
      description: Authenticated but lacks required scope.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: State conflict (e.g. pipeline busy, duplicate name).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    PreconditionFailed:
      description: '`If-Match` precondition failed.'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Client exceeded the rate limit.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
        X-RateLimit-Limit:
          $ref: '#/components/headers/RateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/RateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/RateLimitReset'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Internal:
      description: Unhandled internal error.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NoContent:
      description: Success with no response body.

  schemas:
    Id:
      type: string
      description: Server-generated ULID.
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      example: 01HF8Z8W9Q4J7K5N2V3X6M1T0B
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC timestamp.
      example: '2026-04-18T09:02:39Z'
    Problem:
      type: object
      description: RFC 7807 Problem Details with vendor extensions.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type.
        title:
          type: string
          description: Short human-readable summary.
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          description: URI reference identifying the specific occurrence.
        code:
          type: string
          description: Canonical machine-readable code.
          enum:
            - AUTH_REQUIRED
            - FORBIDDEN
            - VALIDATION_FAILED
            - CONFLICT
            - NOT_FOUND
            - RATE_LIMITED
            - LICENSE_INVALID
            - FEATURE_DISABLED
            - HARDWARE_UNSUPPORTED
            - DETECTOR_UNAVAILABLE
            - PIPELINE_BUSY
            - DEPENDENCY_NOT_READY
            - PRECONDITION_FAILED
            - INTERNAL
        trace_id:
          type: string
          description: Server-assigned trace identifier.
        errors:
          type: array
          description: Field-level validation errors (when `code=VALIDATION_FAILED`).
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
              rule:
                type: string
    Page:
      type: object
      description: Cursor pagination envelope.
      required: [items]
      properties:
        items:
          type: array
          items: {}
        next_cursor:
          type: string
          nullable: true
        total:
          type: integer
          description: Total count if cheap to compute; otherwise omitted.
    Point:
      type: object
      required: [x, y]
      properties:
        x: { type: number, minimum: 0, maximum: 1 }
        y: { type: number, minimum: 0, maximum: 1 }
    Rect:
      type: object
      required: [x, y, w, h]
      properties:
        x: { type: number, minimum: 0, maximum: 1 }
        y: { type: number, minimum: 0, maximum: 1 }
        w: { type: number, minimum: 0, maximum: 1 }
        h: { type: number, minimum: 0, maximum: 1 }
    ROI:
      description: Region of interest in normalized coordinates.
      allOf:
        - $ref: '#/components/schemas/Rect'
    Oval:
      type: object
      required: [center, radii]
      properties:
        center: { $ref: '#/components/schemas/Point' }
        radii:
          type: object
          required: [rx, ry]
          properties:
            rx: { type: number, minimum: 0, maximum: 1 }
            ry: { type: number, minimum: 0, maximum: 1 }
        rotation:
          type: number
          description: Rotation in degrees.
          default: 0
    Contour:
      type: array
      description: Polygon vertices (>=3) in normalized coordinates.
      minItems: 3
      items:
        $ref: '#/components/schemas/Point'
    HardwarePlatform:
      type: string
      enum: [jetson-nano, ambarella, rpi-hailo]
    Resource:
      type: object
      description: Base fields present on all concrete resources.
      required: [id, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        created_at: { $ref: '#/components/schemas/Timestamp' }
        updated_at: { $ref: '#/components/schemas/Timestamp' }

    # --- Auth / users ----------------------------------------------------
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1, maxLength: 128 }
        password: { type: string, minLength: 1, maxLength: 1024, format: password }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds.
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string, format: password }
        new_password: { type: string, format: password, minLength: 12 }
    Role:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, scopes, builtin]
          properties:
            name: { type: string }
            description: { type: string }
            scopes:
              type: array
              items: { type: string }
              description: RBAC scope strings, e.g. `pipelines:write`.
            builtin:
              type: boolean
              description: Built-in roles cannot be modified or deleted.
    RoleCreate:
      type: object
      required: [name, scopes]
      properties:
        name: { type: string, minLength: 1, maxLength: 64 }
        description: { type: string, maxLength: 512 }
        scopes:
          type: array
          items: { type: string }
    User:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [username, roles, locked]
          properties:
            username: { type: string }
            email: { type: string, format: email, nullable: true }
            full_name: { type: string, nullable: true }
            roles:
              type: array
              items: { type: string }
              description: Role names.
            locked: { type: boolean }
            last_login_at:
              allOf:
                - $ref: '#/components/schemas/Timestamp'
              nullable: true
    UserCreate:
      type: object
      required: [username, password, roles]
      properties:
        username: { type: string, minLength: 1, maxLength: 64 }
        password: { type: string, format: password, minLength: 12 }
        email: { type: string, format: email }
        full_name: { type: string, maxLength: 128 }
        roles:
          type: array
          items: { type: string }
          minItems: 1
    UserUpdate:
      type: object
      properties:
        email: { type: string, format: email, nullable: true }
        full_name: { type: string, maxLength: 128, nullable: true }
        roles:
          type: array
          items: { type: string }
    Me:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [scopes]
          properties:
            scopes:
              type: array
              description: Effective scopes granted by the user's roles.
              items: { type: string }
    ApiKey:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, prefix, scopes]
          properties:
            name: { type: string }
            prefix:
              type: string
              description: First 8 chars of the secret, safe to display.
            scopes:
              type: array
              items: { type: string }
            expires_at:
              allOf:
                - $ref: '#/components/schemas/Timestamp'
              nullable: true
            last_used_at:
              allOf:
                - $ref: '#/components/schemas/Timestamp'
              nullable: true
    ApiKeyCreate:
      type: object
      required: [name, scopes]
      properties:
        name: { type: string, maxLength: 64 }
        scopes:
          type: array
          items: { type: string }
        expires_at:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          nullable: true
    ApiKeyCreated:
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [secret]
          properties:
            secret:
              type: string
              description: Full secret. Shown only once, at creation time.
    AuditEvent:
      type: object
      required: [id, ts, actor, action, outcome]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        ts: { $ref: '#/components/schemas/Timestamp' }
        actor:
          type: object
          required: [type]
          properties:
            type: { type: string, enum: [user, api_key, system] }
            id: { type: string, nullable: true }
            name: { type: string, nullable: true }
        action: { type: string, description: Dotted action identifier, e.g. `pipeline.start`. }
        target:
          type: object
          nullable: true
          properties:
            type: { type: string }
            id: { type: string }
        outcome: { type: string, enum: [success, failure] }
        detail: { type: string, nullable: true }
        request_id: { type: string, nullable: true }

    # --- System ----------------------------------------------------------
    SystemInfo:
      type: object
      required: [model, platform, firmware_version, serial, uptime_seconds, hostname]
      properties:
        model: { type: string }
        platform: { $ref: '#/components/schemas/HardwarePlatform' }
        firmware_version: { type: string }
        firmware_slot: { type: string, enum: [a, b] }
        serial: { type: string }
        hostname: { type: string }
        uptime_seconds: { type: integer, minimum: 0 }
        boot_time: { $ref: '#/components/schemas/Timestamp' }
    SystemHealth:
      type: object
      required: [status, subsystems]
      properties:
        status: { type: string, enum: [ok, degraded, failed] }
        subsystems:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name: { type: string }
              status: { type: string, enum: [ok, degraded, failed] }
              detail: { type: string, nullable: true }
              updated_at: { $ref: '#/components/schemas/Timestamp' }
    SystemTime:
      type: object
      required: [now, timezone, ntp_enabled]
      properties:
        now: { $ref: '#/components/schemas/Timestamp' }
        timezone: { type: string, example: Europe/London }
        ntp_enabled: { type: boolean }
        ntp_servers:
          type: array
          items: { type: string }
    SystemTimeUpdate:
      type: object
      properties:
        timezone: { type: string }
        ntp_enabled: { type: boolean }
        ntp_servers:
          type: array
          items: { type: string }
        manual_time:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          nullable: true
    NetworkInterface:
      type: object
      required: [name, mac, up]
      properties:
        name: { type: string }
        mac: { type: string }
        up: { type: boolean }
        addresses:
          type: array
          items: { type: string }
        mtu: { type: integer }
    NetworkConfig:
      type: object
      required: [hostname, interfaces]
      properties:
        hostname: { type: string }
        dns_servers:
          type: array
          items: { type: string }
        interfaces:
          type: array
          items: { $ref: '#/components/schemas/NetworkInterface' }
    NetworkConfigUpdate:
      type: object
      properties:
        hostname: { type: string, maxLength: 253 }
        dns_servers:
          type: array
          items: { type: string }

    # --- Inputs ----------------------------------------------------------
    InputKind:
      type: string
      enum: [usb, csi, rtsp, file]
    InputCapabilities:
      type: object
      properties:
        resolutions:
          type: array
          items:
            type: object
            required: [width, height]
            properties:
              width: { type: integer }
              height: { type: integer }
        fps:
          type: array
          items: { type: number }
        pixel_formats:
          type: array
          items: { type: string }
    Input:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, kind, state]
          properties:
            name: { type: string }
            kind: { $ref: '#/components/schemas/InputKind' }
            uri:
              type: string
              description: |
                Source URI. For `rtsp`, credentials embedded in the URI are
                stripped and written to the secret store; responses never
                expose the password.
            device_path: { type: string, nullable: true }
            capabilities: { $ref: '#/components/schemas/InputCapabilities' }
            state:
              type: string
              enum: [available, unavailable, error]
            last_error: { type: string, nullable: true }
    InputCreate:
      type: object
      required: [name, kind]
      properties:
        name: { type: string, maxLength: 128 }
        kind: { $ref: '#/components/schemas/InputKind' }
        uri: { type: string }
        device_path: { type: string }
        credentials:
          type: object
          writeOnly: true
          properties:
            username: { type: string }
            password: { type: string, format: password }
    InputUpdate:
      type: object
      properties:
        name: { type: string, maxLength: 128 }
        uri: { type: string }
        credentials:
          type: object
          writeOnly: true
          properties:
            username: { type: string }
            password: { type: string, format: password }
    InputProbe:
      type: object
      required: [reachable]
      properties:
        reachable: { type: boolean }
        latency_ms: { type: integer, nullable: true }
        detected:
          allOf:
            - $ref: '#/components/schemas/InputCapabilities'
          nullable: true
        detail: { type: string, nullable: true }

    # --- Pipelines -------------------------------------------------------
    PipelineState:
      type: string
      enum: [stopped, starting, running, stopping, errored]
    Pipeline:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, enabled, state, input_id]
          properties:
            name: { type: string }
            description: { type: string, nullable: true }
            enabled: { type: boolean }
            state: { $ref: '#/components/schemas/PipelineState' }
            input_id: { $ref: '#/components/schemas/Id' }
            calibration_id:
              allOf: [ { $ref: '#/components/schemas/Id' } ]
              nullable: true
            detectors:
              type: array
              description: Enabled detector types on this pipeline.
              items:
                type: string
                enum: [face, license_plate, document]
            masks:
              type: array
              items: { $ref: '#/components/schemas/Id' }
            outputs:
              type: array
              items: { $ref: '#/components/schemas/Id' }
    PipelineCreate:
      type: object
      required: [name, input_id]
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, maxLength: 512 }
        enabled: { type: boolean, default: false }
        input_id: { $ref: '#/components/schemas/Id' }
        calibration_id:
          allOf: [ { $ref: '#/components/schemas/Id' } ]
          nullable: true
    PipelineUpdate:
      type: object
      properties:
        name: { type: string, maxLength: 128 }
        description: { type: string, nullable: true }
        enabled: { type: boolean }
        input_id: { $ref: '#/components/schemas/Id' }
        calibration_id:
          allOf: [ { $ref: '#/components/schemas/Id' } ]
          nullable: true
    PipelineStatus:
      type: object
      required: [state, fps_in, fps_out]
      properties:
        state: { $ref: '#/components/schemas/PipelineState' }
        fps_in: { type: number }
        fps_out: { type: number }
        backpressure:
          type: number
          description: 0..1 utilization of the input queue.
          minimum: 0
          maximum: 1
        dropped_frames: { type: integer, minimum: 0 }
        last_error: { type: string, nullable: true }
        started_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true

    # --- Detectors -------------------------------------------------------
    DetectorConfig:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        model_variant:
          type: string
          enum: [fast, balanced, accurate]
          default: balanced
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.5
        nms_threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.45
        max_detections:
          type: integer
          minimum: 1
          maximum: 1024
          default: 64
        roi:
          allOf:
            - $ref: '#/components/schemas/ROI'
          nullable: true
        classes:
          type: array
          nullable: true
          items: { type: string }
          description: |
            Optional class filter. For `license_plate` this may constrain
            regional plate variants; for `document` it selects document
            types where supported.
        tracking:
          type: object
          properties:
            enabled: { type: boolean, default: false }
            max_age: { type: integer, minimum: 1, default: 30 }
            iou_threshold: { type: number, minimum: 0, maximum: 1, default: 0.3 }
    DetectorSummary:
      type: object
      required: [type, enabled, available]
      properties:
        type:
          type: string
          enum: [face, license_plate, document]
        enabled: { type: boolean }
        available:
          type: boolean
          description: |
            False when the detector is not supported on the current
            hardware. Responses then include the platform in `detail`.
        model_variant: { type: string, enum: [fast, balanced, accurate] }
    DetectorModel:
      type: object
      required: [type, variant, platforms]
      properties:
        type: { type: string, enum: [face, license_plate, document] }
        variant: { type: string, enum: [fast, balanced, accurate] }
        version: { type: string }
        platforms:
          type: array
          items: { $ref: '#/components/schemas/HardwarePlatform' }
        input_resolution:
          type: object
          properties:
            width: { type: integer }
            height: { type: integer }
        size_bytes: { type: integer }

    # --- Calibration -----------------------------------------------------
    Calibration:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, pattern, state]
          properties:
            name: { type: string }
            pattern:
              type: object
              required: [type, cols, rows, square_size_mm]
              properties:
                type: { type: string, enum: [checkerboard, charuco] }
                cols: { type: integer, minimum: 2 }
                rows: { type: integer, minimum: 2 }
                square_size_mm: { type: number, minimum: 0 }
            image_count: { type: integer, minimum: 0 }
            state:
              type: string
              enum: [draft, computed, failed, applied]
            intrinsics:
              type: object
              nullable: true
              properties:
                fx: { type: number }
                fy: { type: number }
                cx: { type: number }
                cy: { type: number }
            distortion:
              type: array
              nullable: true
              items: { type: number }
              description: Distortion coefficients [k1, k2, p1, p2, k3, ...].
            rms_error:
              type: number
              nullable: true
    CalibrationCreate:
      type: object
      required: [name, pattern]
      properties:
        name: { type: string, maxLength: 128 }
        pattern:
          type: object
          required: [type, cols, rows, square_size_mm]
          properties:
            type: { type: string, enum: [checkerboard, charuco] }
            cols: { type: integer, minimum: 2 }
            rows: { type: integer, minimum: 2 }
            square_size_mm: { type: number, minimum: 0 }
    CalibrationUpdate:
      type: object
      properties:
        name: { type: string, maxLength: 128 }
    CalibrationApplyRequest:
      type: object
      required: [pipeline_id]
      properties:
        pipeline_id: { $ref: '#/components/schemas/Id' }

    # --- Masks -----------------------------------------------------------
    MaskShape:
      oneOf:
        - type: object
          required: [type, rect]
          properties:
            type: { type: string, enum: [rectangle] }
            rect: { $ref: '#/components/schemas/Rect' }
        - type: object
          required: [type, oval]
          properties:
            type: { type: string, enum: [oval] }
            oval: { $ref: '#/components/schemas/Oval' }
        - type: object
          required: [type, contour]
          properties:
            type: { type: string, enum: [contour] }
            contour: { $ref: '#/components/schemas/Contour' }
      discriminator:
        propertyName: type
        mapping:
          rectangle: '#/components/schemas/Rect'
          oval: '#/components/schemas/Oval'
          contour: '#/components/schemas/Contour'
    MaskCommon:
      type: object
      required: [target, style, strength]
      properties:
        target:
          type: string
          enum: [face, license_plate, document, all]
        style:
          type: string
          enum: [blur, pixelate, solid]
        strength:
          type: integer
          minimum: 1
          maximum: 100
          description: Intensity of blur/pixelation; ignored for `solid`.
        color:
          type: string
          description: Hex `#RRGGBB` for `solid` style.
          pattern: '^#[0-9A-Fa-f]{6}$'
          nullable: true
        follow_detection:
          type: boolean
          description: |
            When true and `target != all`, the mask tracks detection boxes
            rather than using the static shape.
          default: true
    Mask:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - $ref: '#/components/schemas/MaskCommon'
        - type: object
          required: [shape]
          properties:
            shape: { $ref: '#/components/schemas/MaskShape' }
    MaskCreate:
      allOf:
        - $ref: '#/components/schemas/MaskCommon'
        - type: object
          required: [shape]
          properties:
            shape: { $ref: '#/components/schemas/MaskShape' }
    MaskUpdate:
      type: object
      properties:
        target: { type: string, enum: [face, license_plate, document, all] }
        style: { type: string, enum: [blur, pixelate, solid] }
        strength: { type: integer, minimum: 1, maximum: 100 }
        color: { type: string, pattern: '^#[0-9A-Fa-f]{6}$' }
        follow_detection: { type: boolean }
        shape: { $ref: '#/components/schemas/MaskShape' }

    # --- Outputs ---------------------------------------------------------
    OutputContent:
      type: string
      enum: [processed, original]
    OutputCodec:
      type: string
      enum: [h264, h265, mjpeg, raw]
    OutputKind:
      type: string
      enum: [rtsp, udp, hdmi, shm, file]
    OutputRtsp:
      type: object
      required: [url]
      properties:
        url: { type: string }
        transport: { type: string, enum: [tcp, udp], default: tcp }
        auth:
          type: object
          writeOnly: true
          properties:
            username: { type: string }
            password: { type: string, format: password }
    OutputUdp:
      type: object
      required: [host, port]
      properties:
        host: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        encoder: { type: string, enum: [h264, h265, mjpeg] }
        bitrate_kbps: { type: integer, minimum: 64 }
    OutputHdmi:
      type: object
      required: [port_index]
      properties:
        port_index: { type: integer, minimum: 0 }
        resolution:
          type: object
          properties:
            width: { type: integer }
            height: { type: integer }
        overlay: { type: boolean, default: true }
    OutputShm:
      type: object
      required: [socket_path]
      properties:
        socket_path: { type: string }
    OutputFile:
      type: object
      required: [path]
      properties:
        path: { type: string }
        rotation:
          type: object
          properties:
            interval_seconds: { type: integer, minimum: 0 }
            max_size_mb: { type: integer, minimum: 0 }
            keep: { type: integer, minimum: 1 }
    OutputCommon:
      type: object
      required: [kind, content]
      properties:
        kind: { $ref: '#/components/schemas/OutputKind' }
        content: { $ref: '#/components/schemas/OutputContent' }
        codec:
          allOf: [ { $ref: '#/components/schemas/OutputCodec' } ]
          nullable: true
        rtsp: { $ref: '#/components/schemas/OutputRtsp' }
        udp: { $ref: '#/components/schemas/OutputUdp' }
        hdmi: { $ref: '#/components/schemas/OutputHdmi' }
        shm: { $ref: '#/components/schemas/OutputShm' }
        file: { $ref: '#/components/schemas/OutputFile' }
    Output:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - $ref: '#/components/schemas/OutputCommon'
        - type: object
          required: [name]
          properties:
            name: { type: string }
            state: { type: string, enum: [stopped, running, errored] }
            last_error: { type: string, nullable: true }
    OutputCreate:
      allOf:
        - $ref: '#/components/schemas/OutputCommon'
        - type: object
          required: [name]
          properties:
            name: { type: string, maxLength: 128 }
    OutputUpdate:
      type: object
      properties:
        name: { type: string }
        content: { $ref: '#/components/schemas/OutputContent' }
        codec: { $ref: '#/components/schemas/OutputCodec' }
        rtsp: { $ref: '#/components/schemas/OutputRtsp' }
        udp: { $ref: '#/components/schemas/OutputUdp' }
        hdmi: { $ref: '#/components/schemas/OutputHdmi' }
        shm: { $ref: '#/components/schemas/OutputShm' }
        file: { $ref: '#/components/schemas/OutputFile' }

    # --- Power -----------------------------------------------------------
    PowerMetrics:
      type: object
      required: [ts, instant_watts]
      properties:
        ts: { $ref: '#/components/schemas/Timestamp' }
        instant_watts: { type: number }
        avg_1m_watts: { type: number }
        avg_15m_watts: { type: number }
        rails:
          type: array
          items:
            type: object
            required: [name, watts]
            properties:
              name: { type: string, example: soc }
              watts: { type: number }
        thermal:
          type: array
          items:
            type: object
            required: [zone, celsius]
            properties:
              zone: { type: string }
              celsius: { type: number }
              throttled: { type: boolean }
    PowerSeriesPoint:
      type: object
      required: [ts, watts]
      properties:
        ts: { $ref: '#/components/schemas/Timestamp' }
        watts: { type: number }
    PowerPolicy:
      type: object
      required: [profile]
      properties:
        profile:
          type: string
          enum: [performance, balanced, powersave]
        cpu_max_mhz: { type: integer, nullable: true }
        gpu_max_mhz: { type: integer, nullable: true }
        idle_detection:
          type: object
          properties:
            enabled: { type: boolean }
            idle_seconds: { type: integer, minimum: 0 }
        thermal:
          type: object
          properties:
            throttle_celsius: { type: number }
            shutdown_celsius: { type: number }
    PowerSchedule:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, cron, profile, enabled]
          properties:
            name: { type: string }
            cron: { type: string, description: Standard 5-field cron expression. }
            profile:
              type: string
              enum: [performance, balanced, powersave]
            actions:
              type: array
              items:
                type: string
                enum: [dim_hdmi, stop_pipeline, start_pipeline, reboot]
            enabled: { type: boolean }
    PowerScheduleCreate:
      type: object
      required: [name, cron, profile]
      properties:
        name: { type: string, maxLength: 128 }
        cron: { type: string }
        profile:
          type: string
          enum: [performance, balanced, powersave]
        actions:
          type: array
          items:
            type: string
            enum: [dim_hdmi, stop_pipeline, start_pipeline, reboot]
        enabled: { type: boolean, default: true }

    # --- Stats -----------------------------------------------------------
    StatsSummary:
      type: object
      required: [since_boot, lifetime]
      properties:
        since_boot: { $ref: '#/components/schemas/StatsCounters' }
        lifetime: { $ref: '#/components/schemas/StatsCounters' }
    StatsCounters:
      type: object
      required: [frames_in, frames_processed, frames_dropped]
      properties:
        frames_in: { type: integer, minimum: 0 }
        frames_processed: { type: integer, minimum: 0 }
        frames_dropped: { type: integer, minimum: 0 }
        avg_fps: { type: number }
        peak_fps: { type: number }
        avg_inference_ms: { type: number }
        detectors:
          type: object
          additionalProperties:
            type: object
            required: [detections]
            properties:
              detections: { type: integer, minimum: 0 }
              unique_tracked: { type: integer, minimum: 0 }
    StatsTimeseries:
      type: object
      required: [metric, step_seconds, points]
      properties:
        metric: { type: string }
        step_seconds: { type: integer, minimum: 1 }
        points:
          type: array
          items:
            type: object
            required: [ts, value]
            properties:
              ts: { $ref: '#/components/schemas/Timestamp' }
              value: { type: number }
    StatsResetRequest:
      type: object
      properties:
        namespaces:
          type: array
          description: '`all` resets everything; otherwise selective.'
          items:
            type: string
            enum: [all, pipelines, detectors, power]

    # --- Updates ---------------------------------------------------------
    UpdateStatus:
      type: object
      required: [current_version, channel, available_count, security_count]
      properties:
        current_version: { type: string }
        channel: { type: string, enum: [stable, beta, security-only] }
        available_count: { type: integer, minimum: 0 }
        security_count: { type: integer, minimum: 0 }
        last_checked_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
        slots:
          type: object
          properties:
            active: { type: string, enum: [a, b] }
            a_version: { type: string }
            b_version: { type: string, nullable: true }
    UpdateInfo:
      type: object
      required: [id, version, severity, requires_reboot, size_bytes]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        version: { type: string }
        severity:
          type: string
          enum: [critical, high, medium, low, informational]
        changelog: { type: string }
        size_bytes: { type: integer }
        requires_reboot: { type: boolean }
        published_at: { $ref: '#/components/schemas/Timestamp' }
    UpdateJob:
      type: object
      required: [id, state, progress]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        update_id: { $ref: '#/components/schemas/Id' }
        state:
          type: string
          enum: [queued, downloading, verifying, installing, finalizing, success, failed, rolled_back]
        progress: { type: number, minimum: 0, maximum: 1 }
        started_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
        finished_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
        error: { type: string, nullable: true }
    UpdateChannelRequest:
      type: object
      required: [channel]
      properties:
        channel: { type: string, enum: [stable, beta, security-only] }

    # --- Tunnels ---------------------------------------------------------
    Tunnel:
      allOf:
        - $ref: '#/components/schemas/Resource'
        - type: object
          required: [name, type, endpoint, enabled]
          properties:
            name: { type: string }
            type: { type: string, enum: [selink] }
            endpoint: { type: string }
            enabled: { type: boolean }
    TunnelCreate:
      type: object
      required: [name, type, endpoint]
      properties:
        name: { type: string, maxLength: 128 }
        type: { type: string, enum: [selink] }
        endpoint: { type: string }
        enabled: { type: boolean, default: false }
        credentials:
          type: object
          writeOnly: true
          properties:
            token: { type: string, format: password }
    TunnelUpdate:
      type: object
      properties:
        name: { type: string }
        endpoint: { type: string }
        enabled: { type: boolean }
        credentials:
          type: object
          writeOnly: true
          properties:
            token: { type: string, format: password }
    TunnelStatus:
      type: object
      required: [state]
      properties:
        state: { type: string, enum: [disconnected, connecting, connected, error] }
        remote_id: { type: string, nullable: true }
        latency_ms: { type: integer, nullable: true }
        bytes_in: { type: integer, minimum: 0 }
        bytes_out: { type: integer, minimum: 0 }
        connected_since:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
        last_error: { type: string, nullable: true }

    # --- License ---------------------------------------------------------
    LicenseStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, expired, invalid, unlicensed, grace]
        plan: { type: string, nullable: true }
        features:
          type: array
          items: { type: string }
        seats: { type: integer, nullable: true }
        expires_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
        hardware_binding:
          type: object
          nullable: true
          properties:
            serial: { type: string }
            platform: { $ref: '#/components/schemas/HardwarePlatform' }
        last_refresh_at:
          allOf: [ { $ref: '#/components/schemas/Timestamp' } ]
          nullable: true
    LicenseActivateRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
          writeOnly: true
          description: Hardware-bound license key string.
    LicenseFeatures:
      type: object
      required: [features]
      properties:
        features:
          type: array
          items: { type: string }
          description: Feature flags derived from the active license.

    # --- Events ----------------------------------------------------------
    Event:
      type: object
      required: [id, ts, channel, data]
      properties:
        id: { $ref: '#/components/schemas/Id' }
        ts: { $ref: '#/components/schemas/Timestamp' }
        channel:
          type: string
          enum:
            - pipeline.status
            - power.metrics
            - detector.events
            - updates.jobs
            - tunnels.status
            - system.health
        data:
          type: object
          additionalProperties: true
